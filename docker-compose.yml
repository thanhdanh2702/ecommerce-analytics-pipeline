services:
  warehouse-postgres:
    image: ${POSTGRES_IMAGE}
    container_name: ${WAREHOUSE_DB_CONTAINER_NAME}
    environment:
      POSTGRES_USER: ${WAREHOUSE_DB_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_DB_PASSWORD}
      POSTGRES_DB: ${WAREHOUSE_DB_NAME}
    ports:
      - "${WAREHOUSE_DB_PORT}:${WAREHOUSE_DB_CONTAINER_PORT}"
    volumes:
      - warehouse_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${WAREHOUSE_DB_USER} -d ${WAREHOUSE_DB_NAME}",
        ]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES}

  airflow-postgres:
    image: ${POSTGRES_IMAGE}
    container_name: ${AIRFLOW_DB_CONTAINER_NAME}
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    ports:
      - "${AIRFLOW_DB_PORT}:${AIRFLOW_DB_CONTAINER_PORT}"
    volumes:
      - airflow_metadata_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${AIRFLOW_DB_USER} -d ${AIRFLOW_DB_NAME}",
        ]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES}

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
      args:
        AIRFLOW_IMAGE: ${AIRFLOW_IMAGE}
        AIRFLOW_VERSION: ${AIRFLOW_VERSION}
    container_name: ${AIRFLOW_INIT_CONTAINER_NAME}
    depends_on:
      airflow-postgres:
        condition: service_healthy
      warehouse-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES}
      AIRFLOW__CORE__AUTH_MANAGER: ${AIRFLOW_AUTH_MANAGER}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_SIMPLE_AUTH_MANAGER_USERS}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: ${AIRFLOW_SIMPLE_AUTH_MANAGER_PASSWORDS_FILE}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: ${AIRFLOW_EXECUTION_API_SERVER_URL}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_CONTAINER_HOST}:${AIRFLOW_DB_CONTAINER_PORT}/${AIRFLOW_DB_NAME}
      AIRFLOW_SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: ${AIRFLOW_SIMPLE_AUTH_MANAGER_PASSWORDS_FILE}
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      WAREHOUSE_DB_HOST: ${WAREHOUSE_DB_CONTAINER_HOST}
      WAREHOUSE_DB_PORT: ${WAREHOUSE_DB_CONTAINER_PORT}
      WAREHOUSE_DB_USER: ${WAREHOUSE_DB_USER}
      WAREHOUSE_DB_PASSWORD: ${WAREHOUSE_DB_PASSWORD}
      WAREHOUSE_DB_NAME: ${WAREHOUSE_DB_NAME}
      WAREHOUSE_DBT_SCHEMA: ${WAREHOUSE_DBT_SCHEMA}
      PROJECT_ROOT: ${PROJECT_ROOT_IN_CONTAINER}
      DBT_PROFILES_DIR: ${DBT_PROFILES_DIR_IN_CONTAINER}
    volumes:
      - .:${PROJECT_ROOT_IN_CONTAINER}
      - ./dags:${AIRFLOW_DAGS_IN_CONTAINER}
    command: >
      bash -c "airflow db migrate &&
      python -c 'import json, os, pathlib; path = pathlib.Path(os.environ[\"AIRFLOW_SIMPLE_AUTH_MANAGER_PASSWORDS_FILE\"]); path.parent.mkdir(parents=True, exist_ok=True); path.write_text(json.dumps({os.environ[\"AIRFLOW_ADMIN_USERNAME\"]: os.environ[\"AIRFLOW_ADMIN_PASSWORD\"]}))'"

  airflow-api-server:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
      args:
        AIRFLOW_IMAGE: ${AIRFLOW_IMAGE}
        AIRFLOW_VERSION: ${AIRFLOW_VERSION}
    container_name: ${AIRFLOW_API_SERVER_CONTAINER_NAME}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
      warehouse-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES}
      AIRFLOW__CORE__AUTH_MANAGER: ${AIRFLOW_AUTH_MANAGER}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_SIMPLE_AUTH_MANAGER_USERS}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: ${AIRFLOW_SIMPLE_AUTH_MANAGER_PASSWORDS_FILE}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: ${AIRFLOW_EXECUTION_API_SERVER_URL}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_CONTAINER_HOST}:${AIRFLOW_DB_CONTAINER_PORT}/${AIRFLOW_DB_NAME}
      WAREHOUSE_DB_HOST: ${WAREHOUSE_DB_CONTAINER_HOST}
      WAREHOUSE_DB_PORT: ${WAREHOUSE_DB_CONTAINER_PORT}
      WAREHOUSE_DB_USER: ${WAREHOUSE_DB_USER}
      WAREHOUSE_DB_PASSWORD: ${WAREHOUSE_DB_PASSWORD}
      WAREHOUSE_DB_NAME: ${WAREHOUSE_DB_NAME}
      WAREHOUSE_DBT_SCHEMA: ${WAREHOUSE_DBT_SCHEMA}
      PROJECT_ROOT: ${PROJECT_ROOT_IN_CONTAINER}
      DBT_PROFILES_DIR: ${DBT_PROFILES_DIR_IN_CONTAINER}
    volumes:
      - .:${PROJECT_ROOT_IN_CONTAINER}
      - ./dags:${AIRFLOW_DAGS_IN_CONTAINER}
    ports:
      - "${AIRFLOW_API_SERVER_PORT}:8080"
    command: api-server

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
      args:
        AIRFLOW_IMAGE: ${AIRFLOW_IMAGE}
        AIRFLOW_VERSION: ${AIRFLOW_VERSION}
    container_name: ${AIRFLOW_SCHEDULER_CONTAINER_NAME}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
      warehouse-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES}
      AIRFLOW__CORE__AUTH_MANAGER: ${AIRFLOW_AUTH_MANAGER}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_SIMPLE_AUTH_MANAGER_USERS}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: ${AIRFLOW_SIMPLE_AUTH_MANAGER_PASSWORDS_FILE}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: ${AIRFLOW_EXECUTION_API_SERVER_URL}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_CONTAINER_HOST}:${AIRFLOW_DB_CONTAINER_PORT}/${AIRFLOW_DB_NAME}
      WAREHOUSE_DB_HOST: ${WAREHOUSE_DB_CONTAINER_HOST}
      WAREHOUSE_DB_PORT: ${WAREHOUSE_DB_CONTAINER_PORT}
      WAREHOUSE_DB_USER: ${WAREHOUSE_DB_USER}
      WAREHOUSE_DB_PASSWORD: ${WAREHOUSE_DB_PASSWORD}
      WAREHOUSE_DB_NAME: ${WAREHOUSE_DB_NAME}
      WAREHOUSE_DBT_SCHEMA: ${WAREHOUSE_DBT_SCHEMA}
      PROJECT_ROOT: ${PROJECT_ROOT_IN_CONTAINER}
      DBT_PROFILES_DIR: ${DBT_PROFILES_DIR_IN_CONTAINER}
    volumes:
      - .:${PROJECT_ROOT_IN_CONTAINER}
      - ./dags:${AIRFLOW_DAGS_IN_CONTAINER}
    command: scheduler

  airflow-dag-processor:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
      args:
        AIRFLOW_IMAGE: ${AIRFLOW_IMAGE}
        AIRFLOW_VERSION: ${AIRFLOW_VERSION}
    container_name: ${AIRFLOW_DAG_PROCESSOR_CONTAINER_NAME}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
      warehouse-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW_EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW_LOAD_EXAMPLES}
      AIRFLOW__CORE__AUTH_MANAGER: ${AIRFLOW_AUTH_MANAGER}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW_SIMPLE_AUTH_MANAGER_USERS}
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: ${AIRFLOW_SIMPLE_AUTH_MANAGER_PASSWORDS_FILE}
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: ${AIRFLOW_EXECUTION_API_SERVER_URL}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_CONTAINER_HOST}:${AIRFLOW_DB_CONTAINER_PORT}/${AIRFLOW_DB_NAME}
      WAREHOUSE_DB_HOST: ${WAREHOUSE_DB_CONTAINER_HOST}
      WAREHOUSE_DB_PORT: ${WAREHOUSE_DB_CONTAINER_PORT}
      WAREHOUSE_DB_USER: ${WAREHOUSE_DB_USER}
      WAREHOUSE_DB_PASSWORD: ${WAREHOUSE_DB_PASSWORD}
      WAREHOUSE_DB_NAME: ${WAREHOUSE_DB_NAME}
      WAREHOUSE_DBT_SCHEMA: ${WAREHOUSE_DBT_SCHEMA}
      PROJECT_ROOT: ${PROJECT_ROOT_IN_CONTAINER}
      DBT_PROFILES_DIR: ${DBT_PROFILES_DIR_IN_CONTAINER}
    volumes:
      - .:${PROJECT_ROOT_IN_CONTAINER}
      - ./dags:${AIRFLOW_DAGS_IN_CONTAINER}
    command: dag-processor

volumes:
  warehouse_data:
  airflow_metadata_data:
