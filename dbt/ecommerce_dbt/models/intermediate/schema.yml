version: 2

models:
  - name: int_orders_enriched
    description: Orders enriched with customer, payment, and review information.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null

  - name: int_order_items_enriched
    description: Order items enriched with product, category, and seller information.
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null