version: 2

sources:
  - name: raw
    description: Raw Olist data loaded from CSV files into PostgreSQL.
    schema: raw
    tables:
      - name: customers
        columns:
          - name: customer_id
            tests:
              - not_null
              - unique
          - name: customer_unique_id
            tests:
              - not_null

      - name: geolocation
        columns:
          - name: geolocation_zip_code_prefix
            tests:
              - not_null

      - name: order_items
        columns:
          - name: order_id
            tests:
              - not_null
          - name: order_item_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
          - name: seller_id
            tests:
              - not_null

      - name: order_payments
        columns:
          - name: order_id
            tests:
              - not_null
          - name: payment_sequential
            tests:
              - not_null
          - name: payment_type
            tests:
              - not_null

      - name: order_reviews
        columns:
          - name: review_id
            tests:
              - not_null
          - name: order_id
            tests:
              - not_null
          - name: review_score
            tests:
              - not_null

      - name: orders
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: customer_id
            tests:
              - not_null
          - name: order_status
            tests:
              - not_null

      - name: products
        columns:
          - name: product_id
            tests:
              - not_null
              - unique

      - name: sellers
        columns:
          - name: seller_id
            tests:
              - not_null
              - unique

      - name: product_category_name_translation
        columns:
          - name: product_category_name
            tests:
              - not_null
              - unique
          - name: product_category_name_english
            tests:
              - not_null

models:
  - name: stg_customers
    description: Cleaned customer records from the raw Olist customers table.
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        tests:
          - not_null

  - name: stg_geolocation
    description: Cleaned geolocation records from the raw Olist geolocation table.
    columns:
      - name: geolocation_zip_code_prefix
        tests:
          - not_null

  - name: stg_order_items
    description: Cleaned order item records from the raw Olist order items table.
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null

  - name: stg_order_payments
    description: Cleaned payment records from the raw Olist order payments table.
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_sequential
        tests:
          - not_null
      - name: payment_type
        tests:
          - not_null

  - name: stg_order_reviews
    description: Cleaned review records from the raw Olist order reviews table.
    columns:
      - name: review_id
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: review_score
        tests:
          - not_null

  - name: stg_orders
    description: Cleaned order records from the raw Olist orders table.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null

  - name: stg_product_category_name_translation
    description: Cleaned product category Portuguese-to-English translations.
    columns:
      - name: product_category_name
        tests:
          - not_null
          - unique
      - name: product_category_name_english
        tests:
          - not_null

  - name: stg_products
    description: Cleaned product records from the raw Olist products table.
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: stg_sellers
    description: Cleaned seller records from the raw Olist sellers table.
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique
