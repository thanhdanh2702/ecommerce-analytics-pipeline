ecommerce_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('WAREHOUSE_DB_HOST') }}"
      user: "{{ env_var('WAREHOUSE_DB_USER') }}"
      password: "{{ env_var('WAREHOUSE_DB_PASSWORD') }}"
      port: "{{ env_var('WAREHOUSE_DB_PORT') | as_number }}"
      dbname: "{{ env_var('WAREHOUSE_DB_NAME') }}"
      schema: "{{ env_var('WAREHOUSE_DBT_SCHEMA') }}"
      threads: "{{ env_var('DBT_THREADS') | as_number }}"
