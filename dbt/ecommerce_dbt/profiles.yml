ecommerce_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('WAREHOUSE_DB_HOST', 'localhost') }}"
      user: "{{ env_var('WAREHOUSE_DB_USER', 'ecommerce') }}"
      password: "{{ env_var('WAREHOUSE_DB_PASSWORD', 'ecommerce') }}"
      port: "{{ env_var('WAREHOUSE_DB_PORT', '5434') | as_number }}"
      dbname: "{{ env_var('WAREHOUSE_DB_NAME', 'ecommerce') }}"
      schema: "{{ env_var('WAREHOUSE_DBT_SCHEMA', 'analytics') }}"
      threads: "{{ env_var('DBT_THREADS', '4') | as_number }}"
